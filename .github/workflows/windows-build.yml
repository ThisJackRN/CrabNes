name: CrabNes Windows build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build files
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace --locked

      - name: Build optimized emulator
        run: cargo build --release -p nes-ui --bin CrabNes --locked

      - name: Package CrabNes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/release/CrabNes.exe dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: CrabNes-windows-x64
          path: dist/
          if-no-files-found: error
          retention-days: 30
